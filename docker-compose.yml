services:
  # ---- MongoDB ----
  mongo:
    image: mongo:7
    container_name: pixelforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---- FastAPI backend (GPU) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelforge-backend
    ports:
      - "8000:8000"
    environment:
      - PIXELFORGE_SKIP_LOAD=0
      - PIXELFORGE_JWT_SECRET=${JWT_SECRET:-pixelforge-super-secret-change-me-32b!}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB_NAME=pixelforge
    volumes:
      - hf-cache:/app/.cache/huggingface   # persist downloaded models
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ---- React frontend (nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pixelforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api                # Routed through nginx proxy
    restart: unless-stopped

volumes:
  mongo-data:
  hf-cache:
